<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入隊申請 | LSST</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; font-weight: 700 !important; background-color: #f5f5f5; }
        .hero.is-recruit {
            background: linear-gradient(rgba(0, 20, 50, 0.8), rgba(0, 0, 0, 0.8)), url('policeStation4.png');
            background-size: cover; padding: 100px 0 60px 0; color: white;
        }
        .form-container { background: white; padding: 40px; margin-top: -40px; border-top: 10px solid #3273dc; }
        .label { color: #3273dc; }
    </style>
</head>
<body>
    <nav class="navbar is-dark is-fixed-top">
        <div class="container">
            <div class="navbar-brand"><a class="navbar-item" href="index.html">LSST 公式</a></div>
        </div>
    </nav>

    <section class="hero is-recruit has-text-centered">
        <div class="container">
            <h1 class="title is-1 has-text-white">RECRUITMENT</h1>
            <p class="subtitle is-4 has-text-info">入隊申請フォーム</p>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="columns is-centered">
                <div class="column is-8">
                    <div id="recruit-area" class="form-container">
                        <form id="recruitForm" action="https://formspree.io/f/mzdkdknq" method="POST">
                            <div class="field">
                                <label class="label">氏名</label>
                                <div class="control"><input class="input" type="text" name="氏名" required></div>
                            </div>
                            <div class="field">
                                <label class="label">Discord ID</label>
                                <div class="control"><input class="input" type="text" name="DiscordID" required></div>
                            </div>
                            <div class="field">
                                <label class="label">メールアドレス</label>
                                <div class="control"><input class="input" type="email" name="_replyto" required></div>
                            </div>
                            <div class="field">
                                <label class="label">志望動機</label>
                                <div class="control"><textarea class="textarea" name="志望動機" rows="5" required></textarea></div>
                            </div>
                            <input type="hidden" name="_next" value="index.html">
                            <button type="submit" class="button is-link is-fullwidth is-large mt-6"><strong>入隊を申請する</strong></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const RECRUIT_ID = 'lsst_recruit_submitted';
        const recruitArea = document.getElementById('recruit-area');

        if (localStorage.getItem(RECRUIT_ID)) {
            recruitArea.innerHTML = `
                <div class="notification is-danger is-light has-text-centered">
                    <i class="fas fa-user-shield fa-2x mb-3"></i><br>
                    <strong>入隊申請はすでに受領しています。</strong><br>
                    二重申請は不要です。E-mailでの連絡をお待ちください。
                </div>
            `;
        }

        document.getElementById('recruitForm').onsubmit = function() {
            localStorage.setItem(RECRUIT_ID, 'true');
        };
    </script>
</body>
</html>
